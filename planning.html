<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norlo Dispatch Planning Grid</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #f2f2f2; color: #222; min-height: 100vh; overflow-x: hidden;
}
#norloHeader {
  position: sticky; top: 0; z-index: 100;
  background: #1a472a; border-bottom: 2px solid #2d7a3a;
  padding: 0.6rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 0.75rem; }
.header-left h1 { color: #fff; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
.header-btn {
  background: #2d7a3a; border: 1px solid #4a9e5a; border-radius: 4px;
  color: #fff; padding: 0.35rem 0.7rem; font-size: 0.75rem;
  cursor: pointer; font-weight: 600; text-decoration: none; white-space: nowrap; transition: background 0.15s;
}
.header-btn:hover { background: #4a9e5a; }
.header-right { display: flex; align-items: center; gap: 0.75rem; }
#signOutBtn { color: #b0d4b8; font-size: 0.75rem; cursor: pointer; text-decoration: underline; background: none; border: none; }
#refreshBtn { font-size: 0.8rem; }
#toolbarBar {
  position: sticky; top: 48px; z-index: 99;
  background: #fff; border-bottom: 2px solid #d0d0d0;
  padding: 0.4rem 1rem;
  display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
}
.toolbar-left { display: flex; align-items: center; gap: 0.5rem; }
.toolbar-center { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; overflow-x: auto; }
.toolbar-right { display: flex; align-items: center; gap: 0.5rem; }
.toolbar-btn {
  background: #fff; border: 1px solid #bbb; border-radius: 4px;
  color: #555; padding: 0.3rem 0.6rem; font-size: 0.7rem;
  cursor: pointer; font-weight: 500; transition: all 0.15s;
}
.toolbar-btn:hover { border-color: #1a472a; color: #1a472a; background: #eef6ee; }
.jump-btn {
  background: #274e13; border: 1px solid #3a6b1e; border-radius: 3px;
  color: #fff; padding: 0.2rem 0.45rem; font-size: 0.6rem;
  cursor: pointer; font-weight: 600; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.3px; transition: background 0.15s;
}
.jump-btn:hover { background: #3a6b1e; }
#searchInput {
  background: #fff; border: 1px solid #bbb; border-radius: 4px;
  color: #333; padding: 0.3rem 0.6rem; font-size: 0.75rem; width: 180px;
}
#searchInput:focus { outline: none; border-color: #1a472a; box-shadow: 0 0 0 2px rgba(26,71,42,0.15); }
#driverCount { color: #777; font-size: 0.7rem; white-space: nowrap; }
#dayLabel {
  text-align: center; padding: 0.5rem 1rem;
  color: #1a472a; font-size: 1rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: #e8e8e8; border-bottom: 1px solid #d0d0d0;
}
#stickyColHeader {
  position: sticky; top: 82px; z-index: 98;
  background: #274e13; border-bottom: 2px solid #1a3a0d;
  display: flex; align-items: center;
  font-size: 0.6rem; font-weight: 600; color: #fff;
  text-transform: uppercase; letter-spacing: 0.5px;
}
#stickyColHeader span {
  padding: 0.4rem 0.5rem; text-align: center; border-right: 1px solid #1a3a0d;
}
#stickyColHeader span:first-child { text-align: left; }
#stickyColHeader span:last-child { border-right: none; }
.section-block {
  content-visibility: auto; contain-intrinsic-size: auto 60px;
  margin: 0.4rem 0.5rem; scroll-margin-top: 120px;}
.section-header {
  background: #ffd700; border: 1px solid #e6c200; border-radius: 4px 4px 0 0;
  padding: 0.5rem 0.8rem; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  user-select: none; transition: background 0.15s;
}
.section-header:hover { background: #ffe033; }
.section-header.collapsed { border-radius: 4px; }
.section-title { color: #333; font-size: 0.8rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.section-count { color: rgba(0,0,0,0.5); font-size: 0.7rem; font-weight: 500; }
.section-chevron { color: rgba(0,0,0,0.4); font-size: 0.75rem; transition: transform 0.15s; }
.section-header.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body {
  border: 1px solid #ccc; border-top: none;
  border-radius: 0 0 4px 4px; overflow: hidden; background: #fff;
}
.section-header.collapsed + .section-body { display: none; }

/* ── Role Sub-Header (Local / OTR divider within a terminal) ─── */
.role-subheader {
  background: #3a6b1e; color: #fff; font-size: 0.7rem; font-weight: 700;
  padding: 0.35rem 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;
  border-bottom: 1px solid #274e13;
}

/* ── Planning Grid Table ─────────────────────────────────── */
.planning-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; table-layout: fixed; }
.planning-table th {
  background: #274e13; color: #fff; font-weight: 600;
  padding: 0.4rem 0.5rem; text-align: center; font-size: 0.6rem;
  letter-spacing: 0.5px; text-transform: uppercase;
  border-bottom: 2px solid #1a3a0d; white-space: nowrap;
  border-right: 1px solid #1a3a0d;
}
.planning-table thead th:last-child { border-right: none; }
.planning-table th:nth-child(1), .planning-table td:nth-child(1) { width: 140px; }
.planning-table th:nth-child(2), .planning-table td:nth-child(2) { width: 65px; }
.planning-table th:nth-child(3), .planning-table td:nth-child(3) { width: 80px; }
.planning-table th:nth-child(4), .planning-table td:nth-child(4) { width: 110px; }
.planning-table th:nth-child(6), .planning-table td:nth-child(6) { width: 50px; }
.planning-table th:nth-child(7), .planning-table td:nth-child(7) { width: 55px; }
.planning-table th:nth-child(8), .planning-table td:nth-child(8) { width: 45px; }
.planning-table th:nth-child(9), .planning-table td:nth-child(9) { width: 90px; }
.planning-table th:nth-child(10), .planning-table td:nth-child(10) { width: 70px; }
.planning-table th:nth-child(11), .planning-table td:nth-child(11) { width: 58px; }
.planning-table td[colspan] { width: auto; }
.planning-table td:nth-child(1) { background: #e6eed9; }
.planning-table td:nth-child(2) { background: #fef9e0; }
.planning-table td:nth-child(3) { background: #fef9e0; }
.planning-table td:nth-child(4) { background: #e6eed9; }
.planning-table td:nth-child(5) { background: #fff; }
.planning-table td:nth-child(6) { background: #e6eed9; }
.planning-table td:nth-child(7) { background: #e6eed9; }
.planning-table td:nth-child(8) { background: #fef9e0; }
.planning-table td:nth-child(9) { background: #e6eed9; }
.planning-table td:nth-child(10) { background: #f5f0e0; }
.planning-table td:nth-child(11) { background: #e6eed9; }
.planning-table tbody tr { border-bottom: 1px solid #d0d0d0; transition: background 0.1s; }
.planning-table tbody tr:hover td { filter: brightness(0.95); }
.planning-table td {
  padding: 0.4rem 0.5rem; vertical-align: middle;
  color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  border-right: 1px solid #d0d0d0; text-align: center; font-weight: 600;
}
.planning-table td:last-child { border-right: none; }
.planning-table td.driver-name { color: #111; font-weight: 600; text-align: left; font-size: 0.85rem; }
.planning-table td.route-summary {
  color: #555; font-size: 0.7rem; text-align: center;
  white-space: normal; word-wrap: break-word;
}
.planning-table td.role-subheader-cell {
  background: #3a6b1e !important; color: #fff; font-size: 0.7rem; font-weight: 700;
  padding: 0.35rem 0.8rem; letter-spacing: 0.5px; text-transform: uppercase;
  text-align: left; border-right: none;
}
.chip { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.65rem; font-weight: 600; letter-spacing: 0.3px; }
.chip-dispatched { background: #d4edda; color: #155724; }
.chip-off { background: #f8d7da; color: #721c24; }
.chip-empty { background: #d1ecf1; color: #0c5460; }
.chip-loaded { background: #fff3cd; color: #856404; }
.chip-pending { background: #e9e9e9; color: #666; }
.chip-confirmed { background: #c3e6cb; color: #155724; }
tr.driver-off { opacity: 0.45; }
tr.driver-off td { color: #999; }
#dayTabBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: #e8e8e8; border-top: 2px solid #bbb;
  display: flex; align-items: stretch; height: 38px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.day-tab {
  flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center;
  padding: 0 0.5rem; font-size: 0.75rem; font-weight: 600;
  color: #555; background: #e0e0e0; border: none;
  border-right: 1px solid #ccc; cursor: pointer; transition: all 0.15s; white-space: nowrap; position: relative;
}
.day-tab:last-child { border-right: none; }
.day-tab:hover { background: #d0d0d0; color: #333; }
.day-tab.active { background: #fff; color: #1a472a; border-top: 3px solid #f0a500; font-weight: 700; }
.day-tab.today::after { content: ''; position: absolute; bottom: 4px; width: 5px; height: 5px; border-radius: 50%; background: #f0a500; }
#mainContent { padding-bottom: 50px; }
#loadingOverlay { text-align: center; padding: 3rem 1rem; color: #888; font-size: 0.85rem; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #ccc; border-top-color: #1a472a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.5rem; }
@keyframes spin { to { transform: rotate(360deg); } }
#backToTop {
  position: fixed; bottom: 50px; right: 12px; z-index: 90;
  background: #1a472a; border: 1px solid #2d7a3a; border-radius: 20px;
  color: #fff; padding: 0.3rem 0.7rem; font-size: 0.7rem;
  font-weight: 700; cursor: pointer; display: none;
  font-family: monospace; text-transform: uppercase; letter-spacing: 1px;
}
#backToTop.visible { display: block; }
.empty-day { text-align: center; padding: 3rem 1rem; color: #888; font-size: 0.85rem; background: #fff; }
@media (max-width: 768px) {
  .day-tab { font-size: 0.65rem; padding: 0 0.3rem; }
  .planning-table td { font-size: 0.7rem; padding: 0.3rem; }
  #searchInput { width: 120px; }
}
</style>
</head>
<body>
<div id="norloHeader">
  <div class="header-left">
    <h1>Dispatch Planning Grid</h1>
    <a href="index.html" class="header-btn">&larr; Driver Board</a>
  </div>
  <div class="header-right">
    <button id="refreshBtn" class="header-btn" onclick="refreshData()">&#x21bb; Refresh</button>
    <button id="signOutBtn" onclick="signOut()">Sign out</button>
  </div>
</div>
<div id="toolbarBar">
  <div class="toolbar-left">
    <button class="toolbar-btn" onclick="expandAll()">+ Expand All</button>
    <button class="toolbar-btn" onclick="collapseAll()">&minus; Collapse All</button>
    <span id="driverCount"></span>
  </div>
  <div class="toolbar-center" id="terminalJumpBar"></div>
  <div class="toolbar-right">
    <input type="text" id="searchInput" placeholder="&#x2315; Search drivers&hellip;" oninput="applySearch()">
  </div>
</div>
<div id="dayLabel">Sunday</div>
<div id="stickyColHeader">
  <span style="width:140px">Driver</span><span style="width:65px">Start</span><span style="width:80px">Arr. 1st</span><span style="width:110px">City</span><span style="flex:1">Route Summary</span><span style="width:50px">Truck</span><span style="width:55px">Trailer</span><span style="width:45px">LD/MT</span><span style="width:90px">Phone</span><span style="width:70px">Status</span><span style="width:58px">Confirm</span>
</div>
<div id="mainContent">
  <div id="loadingOverlay"><div class="spinner"></div><div>Loading planning data&hellip;</div></div>
  <div id="gridContainer"></div>
</div>
<div id="dayTabBar"></div>
<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&uarr; Top</button>

<script>
const PLANNING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHh7gHEFs9TFFxAhspSC22jCTKnO65eo2son0Cq8SiU9JsuWXa1PnCXrD8--nhdxv8mw/exec';
const API_TOKEN = 'norlo-planning-2026';
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const COLUMNS = [
  'RoleBucket','EquipClass','TerminalName','TerminalOrder','DriverID','DriverName',
  'OrderNumber','EventCode','StopCompany','City','State','ZipCode',
  'Arrival','Departure','Est','Dep','OrderStatus','OrderPieces','Weight',
  'OrderCompletion','StopSeq','MovementNum','DepartedFromYard','ElapsedFromYard',
  'TripProgress','IsCurrentStop','CompletedFlag','LastRefreshed',
  'OrdCharge','OrdAccessorial','OrdTotalCharge','Tractor'];

let allDaysData = {};
let currentDay = 0;
let searchTerm = '';

function signOut() { sessionStorage.removeItem('norlo_auth'); window.location.href = 'index.html'; }
function checkAuth() {
  if (sessionStorage.getItem('norlo_auth') === '1') return true;
  window.location.href = 'index.html'; return false;
}
function initApp() { buildDayTabs(); loadAllDays(); }
function buildDayTabs() {
  const bar = document.getElementById('dayTabBar'); const today = new Date(); bar.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(d.getDate() + i);
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' active today' : '');
    btn.dataset.day = i;
    btn.textContent = DAY_SHORT[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate();
    btn.onclick = () => switchDay(i);
    bar.appendChild(btn);
  }
  currentDay = 0; updateDayLabel(0);
}
function updateDayLabel(di) {
  const d = new Date(); d.setDate(d.getDate() + di);
  document.getElementById('dayLabel').textContent = DAY_NAMES[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate();
}

async function loadAllDays() {
  const loading = document.getElementById('loadingOverlay');
  loading.style.display = 'block';
  document.getElementById('gridContainer').innerHTML = '';
  try {
    const resp = await fetch(PLANNING_SCRIPT_URL + '?token=' + encodeURIComponent(API_TOKEN) + '&action=readAllDays');
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    for (let d = 0; d < 7; d++) allDaysData[d] = parseDay((data.days && data.days[d]) || []);
    loading.style.display = 'none';
    renderDay(currentDay);
  } catch (err) {
    loading.innerHTML = '<div style="color:#c00;">Error: ' + err.message + '</div>';
  }
}
function refreshData() { const keepDay = currentDay; const keepScroll = window.scrollY; allDaysData = {}; loadAllDays().then(() => { switchDay(keepDay); window.scrollTo({ top: keepScroll }); }); }  
function parseDay(rows) {
  const records = rows.map(row => {
    const rec = {}; COLUMNS.forEach((col, i) => rec[col] = row[i] || ''); return rec;
  });
  const driverMap = {};
  records.forEach(rec => {
    const id = rec.DriverID;
    if (!id) return;
    if (rec.DriverName && rec.DriverName.includes(',MOCK')) return;
    if (id === 'STIST') return;
    if (rec.DriverName && rec.DriverName.toUpperCase().replace(/\s+/g, '').includes('GOETHALS,TREVIS')) return;
    if (!driverMap[id]) {
      driverMap[id] = {
        id, name: rec.DriverName, terminal: rec.TerminalName,
        terminalOrder: parseInt(rec.TerminalOrder) || 999,
        roleBucket: rec.RoleBucket, equipClass: rec.EquipClass, stops: [],
      };
    }
    driverMap[id].stops.push(rec);
  });

  Object.values(driverMap).forEach(d => {
    d.stops.sort((a, b) => (parseInt(a.StopSeq) || 0) - (parseInt(b.StopSeq) || 0));
    d.firstStopCity = ''; d.firstStopArrival = ''; d.routeSummary = ''; d.tripStatus = '';
  const realStops = d.stops.filter((s, idx) => { if (idx === 0 && s.StopCompany && s.StopCompany.toUpperCase().startsWith('NORTHERN LOGISTICS')) return false; return s.EventCode && !s.EventCode.includes('BMT') && !s.EventCode.includes('RTP'); });    if (realStops.length > 0) {
      d.firstStopCity = realStops[0].City + (realStops[0].State ? ', ' + realStops[0].State : '');
      d.firstStopArrival = formatTime(realStops[0].Arrival);
    }
    const skipFirstTerminal = d.stops.length > 0 && d.stops[0].StopCompany && d.stops[0].StopCompany.toUpperCase().startsWith('NORTHERN LOGISTICS');
    const stopLabels = []; d.stops.forEach((s, idx) => { if (idx === 0 && skipFirstTerminal) return; if (s.City) { const lbl = (s.StopCompany ? s.StopCompany + ' (' + s.City + ')' : s.City); if (!stopLabels.includes(lbl)) stopLabels.push(lbl); } });    d.routeSummary = stopLabels.join(' \u2192 ');
    const orderStops = d.stops.filter(s => s.OrderNumber && s.OrderNumber !== '0');
    if (orderStops.length > 0) {
      const st = orderStops[0].OrderStatus;
      d.tripStatus = st === 'CMP' ? 'Completed' : st === 'DSP' ? 'Dispatched' : st === 'STD' ? 'Started' : st === 'PLN' ? 'Planned' : st || '';
    }
    d.startTime = formatTime(d.stops[0] && d.stops[0].Arrival) || '';    
    d.truck = '';
    d.stops.forEach(s => { if (s.Tractor && s.Tractor !== 'UNKNOWN' && !d.truck) d.truck = s.Tractor; });    if (!d.firstStopArrival && d.stops.length > 0) d.firstStopArrival = formatTime(d.stops[0].Arrival) || '';
  });

  // Group by terminal, then split LOCAL vs OTR within each
  const drivers = Object.values(driverMap);
  const terminalGroups = {};
  drivers.forEach(d => {
    const t = d.terminal || 'UNKNOWN';
    if (!terminalGroups[t]) terminalGroups[t] = { terminal: t, order: d.terminalOrder, local: [], otr: [] };
    if (d.roleBucket === 'LOCAL DV') terminalGroups[t].local.push(d);
    else terminalGroups[t].otr.push(d);
  });
  const sections = Object.values(terminalGroups).sort((a, b) => a.order - b.order);
  sections.forEach(s => {
    s.local.sort((a, b) => a.name.localeCompare(b.name));
    s.otr.sort((a, b) => a.name.localeCompare(b.name));
    s.totalDrivers = s.local.length + s.otr.length;
  });
  return { sections, driverCount: drivers.length };
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  try { const d = new Date(dateStr); if (isNaN(d)) return ''; let h = d.getHours(), m = d.getMinutes(); const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12; return h + ':' + String(m).padStart(2,'0') + ' ' + ap; } catch { return ''; }
}
function formatDriverName(raw) {
  if (!raw) return '';
  const p = raw.split(','); if (p.length < 2) return raw;
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
  return cap(p[0].trim()) + ', ' + cap(p[1].trim());
}

function renderDay(dayIndex) {
  const container = document.getElementById('gridContainer');
  const data = allDaysData[dayIndex];
  if (!data || data.sections.length === 0) {
    const d = new Date(); d.setDate(d.getDate() + dayIndex);
    container.innerHTML = '<div class="empty-day">No drivers for ' + DAY_NAMES[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate() + '</div>';
    updateDriverCount(0); document.getElementById('terminalJumpBar').innerHTML = ''; return;
  }

  const TH_ROW = '<colgroup><col style="width:140px"><col style="width:65px"><col style="width:80px"><col style="width:110px"><col><col style="width:50px"><col style="width:55px"><col style="width:45px"><col style="width:90px"><col style="width:70px"><col style="width:58px"></colgroup>';  let html = '';
  let totalDrivers = 0;

  data.sections.forEach(section => {
    // Filter for search
    const filteredLocal = searchTerm ? section.local.filter(d => matchesSearch(d)) : section.local;
    const filteredOtr = searchTerm ? section.otr.filter(d => matchesSearch(d)) : section.otr;
    const sectionTotal = filteredLocal.length + filteredOtr.length;
    if (sectionTotal === 0) return;
    totalDrivers += sectionTotal;

    html += '<div class="section-block">';
    html += '<div class="section-header" onclick="toggleSection(this)">';
    html += '<span class="section-title">' + section.terminal + '</span>';
    html += '<span><span class="section-count">' + sectionTotal + ' driver' + (sectionTotal !== 1 ? 's' : '') + '</span> <span class="section-chevron">\u25BC</span></span>';
    html += '</div>';
    html += '<div class="section-body">';
    html += '<table class="planning-table">' + TH_ROW + '<tbody>';

    // LOCAL sub-header + rows
    if (filteredLocal.length > 0) {
      html += '<tr><td colspan="11" class="role-subheader-cell">' + section.terminal + ' - Local</td></tr>';
      filteredLocal.forEach(d => { html += driverRow(d); });
    }

    // OTR sub-header + rows
    if (filteredOtr.length > 0) {
      html += '<tr><td colspan="11" class="role-subheader-cell">' + section.terminal + ' - OTR</td></tr>';
      filteredOtr.forEach(d => { html += driverRow(d); });
    }

    html += '</tbody></table></div></div>';
  });

  container.innerHTML = html;
  updateDriverCount(totalDrivers);

  // Terminal jump buttons
  const jumpBar = document.getElementById('terminalJumpBar');
  const blocks = container.querySelectorAll('.section-block');
  jumpBar.innerHTML = '';
  blocks.forEach(s => {
    const name = s.querySelector('.section-title').textContent;
    const btn = document.createElement('button');
    btn.className = 'jump-btn'; btn.textContent = name;
    btn.onclick = () => s.scrollIntoView({ behavior: 'smooth', block: 'start' });
    jumpBar.appendChild(btn);
  });
}

function driverRow(d) {
  const chip = getStatusChip(d.tripStatus);
  return '<tr>' +
    '<td class="driver-name">' + formatDriverName(d.name) + '</td>' +
    '<td>' + d.startTime + '</td>' +
    '<td>' + d.firstStopArrival + '</td>' +
    '<td>' + d.firstStopCity + '</td>' +
    '<td class="route-summary" title="' + escapeHtml(d.routeSummary) + '">' + d.routeSummary + '</td>' +
    '<td>' + escapeHtml(d.truck) + '</td><td></td><td></td><td></td>' +    '<td>' + chip + '</td>' +
    '<td></td></tr>';
}

function getStatusChip(status) {
  if (!status) return '<span class="chip chip-pending">\u2014</span>';
  const s = status.toLowerCase();
  if (s === 'dispatched') return '<span class="chip chip-dispatched">Dispatched</span>';
  if (s === 'completed') return '<span class="chip chip-dispatched">Completed</span>';
  if (s === 'started') return '<span class="chip chip-dispatched">Started</span>';
  if (s === 'planned') return '<span class="chip chip-pending">Planned</span>';
  return '<span class="chip chip-pending">' + escapeHtml(status) + '</span>';
}
function updateDriverCount(n) { document.getElementById('driverCount').textContent = n + ' driver' + (n !== 1 ? 's' : ''); }
function escapeHtml(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }

function switchDay(di) {
  currentDay = di;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.day-tab[data-day="' + di + '"]').classList.add('active');
  updateDayLabel(di);
  if (allDaysData[di]) renderDay(di);
  else { const d = new Date(); d.setDate(d.getDate() + di);
    document.getElementById('gridContainer').innerHTML = '<div class="empty-day">No data for ' + DAY_NAMES[d.getDay()] + ' ' + (d.getMonth()+1) + '/' + d.getDate() + '</div>'; }
}
function toggleSection(h) { h.classList.toggle('collapsed'); }
function expandAll() { document.querySelectorAll('.section-header').forEach(h => h.classList.remove('collapsed')); }
function collapseAll() { document.querySelectorAll('.section-header').forEach(h => h.classList.add('collapsed')); }
function applySearch() { searchTerm = document.getElementById('searchInput').value.trim().toLowerCase(); renderDay(currentDay); }
function matchesSearch(d) {
  if (!searchTerm) return true;
  return [d.name, d.terminal, d.routeSummary, d.firstStopCity, d.tripStatus].join(' ').toLowerCase().includes(searchTerm);
}
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backToTop');
  if (window.scrollY > 400) btn.classList.add('visible'); else btn.classList.remove('visible');
}, { passive: true });

if (checkAuth()) { initApp(); setInterval(() => { if (!document.hidden) refreshData(); }, 300000); }
</script>
</body>
</html>
