<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norlo Dispatch Planning Grid</title>
<style>
/* ── Reset & Base ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0a0a0a;
  color: #e0e0e0;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── NORLO Header (matches index.html) ───────────────────── */
#norloHeader {
  position: sticky; top: 0; z-index: 100;
  background: #052e16; border-bottom: 2px solid #16a34a;
  padding: 0.6rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 0.75rem; }
.header-left h1 {
  color: #86efac; font-size: 1.1rem; font-weight: 700;
  letter-spacing: 0.5px; white-space: nowrap;
}
.header-btn {
  background: #0a3d1f; border: 1px solid #16a34a; border-radius: 4px;
  color: #86efac; padding: 0.35rem 0.7rem; font-size: 0.75rem;
  cursor: pointer; font-weight: 600; text-decoration: none;
  white-space: nowrap; transition: background 0.15s;
}
.header-btn:hover { background: #16a34a; color: #fff; }
.header-right { display: flex; align-items: center; gap: 0.75rem; }
#signOutBtn {
  color: #888; font-size: 0.75rem; cursor: pointer;
  text-decoration: underline; background: none; border: none;
}
#refreshBtn { font-size: 0.8rem; }

/* ── Toolbar Bar ─────────────────────────────────────────── */
#toolbarBar {
  position: sticky; top: 48px; z-index: 99;
  background: #111; border-bottom: 1px solid #333;
  padding: 0.4rem 1rem;
  display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
}
.toolbar-left { display: flex; align-items: center; gap: 0.5rem; }
.toolbar-right { display: flex; align-items: center; gap: 0.5rem; }
.toolbar-btn {
  background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
  color: #aaa; padding: 0.3rem 0.6rem; font-size: 0.7rem;
  cursor: pointer; font-weight: 500; transition: all 0.15s;
}
.toolbar-btn:hover { border-color: #16a34a; color: #86efac; }
#searchInput {
  background: #1a1a1a; border: 1px solid #333; border-radius: 4px;
  color: #e0e0e0; padding: 0.3rem 0.6rem; font-size: 0.75rem;
  width: 180px;
}
#searchInput:focus { outline: none; border-color: #16a34a; }
#driverCount { color: #888; font-size: 0.7rem; white-space: nowrap; }

/* ── Day Label ───────────────────────────────────────────── */
#dayLabel {
  text-align: center; padding: 0.5rem 1rem;
  color: #86efac; font-size: 1rem; font-weight: 700;
  letter-spacing: 1px; text-transform: uppercase;
  background: #0d1117; border-bottom: 1px solid #1a1a1a;
}

/* ── Section (Terminal Group) ────────────────────────────── */
.section-block {
  content-visibility: auto;
  contain-intrinsic-size: auto 60px;
  margin: 0.4rem 0.5rem;
}
.section-header {
  background: #1a2332; border: 1px solid #2a3a4a; border-radius: 6px 6px 0 0;
  padding: 0.5rem 0.8rem; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  user-select: none; transition: background 0.15s;
}
.section-header:hover { background: #1e2d3d; }
.section-header.collapsed { border-radius: 6px; }
.section-title {
  color: #7cb3d4; font-size: 0.8rem; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.section-count {
  color: #556; font-size: 0.7rem; font-weight: 500;
}
.section-chevron {
  color: #556; font-size: 0.75rem; transition: transform 0.15s;
}
.section-header.collapsed .section-chevron { transform: rotate(-90deg); }
.section-body {
  border: 1px solid #2a3a4a; border-top: none;
  border-radius: 0 0 6px 6px; overflow: hidden;
}
.section-header.collapsed + .section-body { display: none; }

/* ── Planning Grid Table ─────────────────────────────────── */
.planning-table {
  width: 100%; border-collapse: collapse; font-size: 0.75rem;
}
.planning-table thead th {
  background: #141e2a; color: #7cb3d4; font-weight: 600;
  padding: 0.4rem 0.5rem; text-align: left; font-size: 0.65rem;
  letter-spacing: 0.5px; text-transform: uppercase;
  border-bottom: 1px solid #2a3a4a; white-space: nowrap;
  position: sticky; top: 92px; z-index: 10;
}
.planning-table tbody tr {
  border-bottom: 1px solid #1a1a1a; transition: background 0.1s;
}
.planning-table tbody tr:hover { background: #151f2a; }
.planning-table td {
  padding: 0.4rem 0.5rem; vertical-align: middle;
  color: #ccc; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; max-width: 220px;
}
.planning-table td.driver-name {
  color: #e0e0e0; font-weight: 600; max-width: 180px;
}
.planning-table td.route-summary {
  color: #999; font-size: 0.7rem; max-width: 320px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── Status Chips ────────────────────────────────────────── */
.chip {
  display: inline-block; padding: 0.15rem 0.4rem; border-radius: 3px;
  font-size: 0.65rem; font-weight: 600; letter-spacing: 0.3px;
}
.chip-dispatched { background: #1a3a1a; color: #86efac; }
.chip-off { background: #3a1a1a; color: #fca5a5; }
.chip-empty { background: #1a1a3a; color: #93c5fd; }
.chip-loaded { background: #2a2a1a; color: #fde68a; }
.chip-pending { background: #1a1a1a; color: #888; }
.chip-confirmed { background: #052e16; color: #4ade80; }

/* ── OFF / Out Row ───────────────────────────────────────── */
tr.driver-off { opacity: 0.45; }
tr.driver-off td { color: #666; }

/* ── Bottom Day Tabs (Google Sheets style) ───────────────── */
#dayTabBar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: #111; border-top: 2px solid #333;
  display: flex; align-items: stretch; height: 38px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.day-tab {
  flex: 1; min-width: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 0 0.5rem; font-size: 0.75rem; font-weight: 600;
  color: #888; background: #1a1a1a; border: none;
  border-right: 1px solid #333; cursor: pointer;
  transition: all 0.15s; white-space: nowrap;
  position: relative;
}
.day-tab:last-child { border-right: none; }
.day-tab:hover { background: #222; color: #ccc; }
.day-tab.active {
  background: #052e16; color: #86efac;
  border-top: 2px solid #16a34a;
}
.day-tab.today::after {
  content: ''; position: absolute; bottom: 4px;
  width: 4px; height: 4px; border-radius: 50%;
  background: #16a34a;
}

/* ── Content Padding for Fixed Bottom Bar ────────────────── */
#mainContent { padding-bottom: 50px; }

/* ── Loading State ───────────────────────────────────────── */
#loadingOverlay {
  text-align: center; padding: 3rem 1rem; color: #888;
  font-size: 0.85rem;
}
.spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 3px solid #333; border-top-color: #16a34a;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 0.5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Back to Top ─────────────────────────────────────────── */
#backToTop {
  position: fixed; bottom: 50px; right: 12px; z-index: 90;
  background: #052e16; border: 1px solid #16a34a; border-radius: 20px;
  color: #86efac; padding: 0.3rem 0.7rem; font-size: 0.7rem;
  font-weight: 700; cursor: pointer; display: none;
  font-family: monospace; text-transform: uppercase;
  letter-spacing: 1px;
}
#backToTop.visible { display: block; }

/* ── Empty State ─────────────────────────────────────────── */
.empty-day {
  text-align: center; padding: 3rem 1rem; color: #555;
  font-size: 0.85rem;
}

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width: 768px) {
  .day-tab { font-size: 0.65rem; padding: 0 0.3rem; }
  .planning-table td { font-size: 0.7rem; padding: 0.3rem; }
  #searchInput { width: 120px; }
}
</style>
</head>
<body>

<!-- ═══ NORLO HEADER ═══ -->
<div id="norloHeader">
  <div class="header-left">
    <h1>Dispatch Planning Grid</h1>
    <a href="index.html" class="header-btn">← Driver Board</a>
  </div>
  <div class="header-right">
    <button id="refreshBtn" class="header-btn" onclick="refreshData()">↻ Refresh</button>
    <button id="signOutBtn" onclick="signOut()">Sign out</button>
  </div>
</div>

<!-- ═══ TOOLBAR ═══ -->
<div id="toolbarBar">
  <div class="toolbar-left">
    <button class="toolbar-btn" onclick="expandAll()">+ Expand All</button>
    <button class="toolbar-btn" onclick="collapseAll()">− Collapse All</button>
    <span id="driverCount"></span>
  </div>
  <div class="toolbar-right">
    <input type="text" id="searchInput" placeholder="⌕ Search drivers…" oninput="applySearch()">
  </div>
</div>

<!-- ═══ DAY LABEL ═══ -->
<div id="dayLabel">Sunday</div>

<!-- ═══ MAIN CONTENT ═══ -->
<div id="mainContent">
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div>Loading planning data…</div>
  </div>
  <div id="gridContainer"></div>
</div>

<!-- ═══ BOTTOM DAY TABS (built dynamically by JS) ═══ -->
<div id="dayTabBar"></div>

<!-- ═══ BACK TO TOP ═══ -->
<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Top</button>

<script>
/* ─────────────────────────────────────────────────────────────
   CONFIG
   ───────────────────────────────────────────────────────────── */
const PLANNING_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwHh7gHEFs9TFFxAhspSC22jCTKnO65eo2son0Cq8SiU9JsuWXa1PnCXrD8--nhdxv8mw/exec';
const API_TOKEN = 'norlo-planning-2026';

const DAY_NAMES = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
const DAY_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

/* Planning TMW Data sheet columns (positional, same as sp_GetLTLBoard + financial cols) */
const COLUMNS = [
  'RoleBucket','EquipClass','TerminalName','TerminalOrder','DriverID','DriverName',
  'OrderNumber','EventCode','StopCompany','City','State','ZipCode',
  'Arrival','Departure','Est','Dep','OrderStatus','OrderPieces','Weight',
  'OrderCompletion','StopSeq','MovementNum','DepartedFromYard','ElapsedFromYard',
  'TripProgress','IsCurrentStop','CompletedFlag','LastRefreshed',
  'OrdCharge','OrdAccessorial','OrdTotalCharge'
];

/* ─── Section order (canonical from Monday, normalized names) ─── */
const SECTION_ORDER = [
  { key: 'CLARE_BOX',          label: 'Clare Box Truck Drivers' },
  { key: 'CLARE_PARTTIME',     label: 'Clare Part Time Drivers' },
  { key: 'CLARE_LOCAL',        label: 'Clare Local Drivers' },
  { key: 'OTR_SUNTHURS',      label: 'OTR Drivers — Sun to Thurs' },
  { key: 'CLARE_OTR',          label: 'Clare OTR Drivers' },
  { key: 'BOYNE_OTR',          label: 'Boyne / Grayling OTR Drivers' },
  { key: 'SUSSEX_WI',          label: 'Sussex WI Drivers' },
  { key: 'LUDINGTON_OTR',      label: 'Ludington OTR Drivers' },
  { key: 'TN_DRIVERS',         label: 'TN Drivers' },
  { key: 'FORT_WAYNE',         label: 'Fort Wayne Drivers' },
  { key: 'TAYLOR_OTR',         label: 'Taylor OTR Drivers' },
  { key: 'TAYLOR_BOX',         label: 'Taylor Box Truck Drivers' },
  { key: 'TAYLOR_LOCAL',       label: 'Taylor Local Drivers' },
  { key: 'LEAR_ROSCOMMON',     label: 'Lear — Roscommon Drivers' },
  { key: 'TC_DRIVERS',         label: 'TC Drivers (Ennis Yard)' },
  { key: 'CADILLAC_LOCAL',     label: 'Cadillac Local Drivers' },
  { key: 'CADILLAC_OTR',       label: 'Cadillac OTR Drivers' },
  { key: 'GR_TERMINAL',        label: 'GR Terminal Drivers' },
  { key: 'GR_OTR',             label: 'GR OTR Drivers' },
  { key: 'GR_BOX',             label: 'GR Box Truck Drivers' },
  { key: 'GR_NONDEDICATED',    label: 'GR Local Non-Dedicated Drivers' },
  { key: 'GR_DEDICATED',       label: 'GR Dedicated Drivers' },
  { key: 'LAKESHORE',          label: 'Lakeshore Drivers' },
  { key: 'CLARE_DEDICATED',    label: 'Clare Dedicated Drivers' },
  { key: 'MIDLAND',            label: 'Midland Drivers' },
  { key: 'AMM_MTPLEASANT',     label: 'AMM Mt Pleasant Drivers' },
  { key: 'PCA_EDMORE',         label: 'PCA Edmore Drivers' },
  { key: 'LANSING',            label: 'Lansing Drivers' },
  { key: 'FLINT',              label: 'Flint Drivers' },
  { key: 'REED_CITY',          label: 'Reed City Drivers' },
  { key: 'LUDINGTON_LOCAL',    label: 'Ludington Local Drivers' },
];

/* ─────────────────────────────────────────────────────────────
   STATE
   ───────────────────────────────────────────────────────────── */
let allDaysData = {};  // { 0: { sections: [...] }, 1: {...}, ... }
let currentDay = 0;
let searchTerm = '';

/* ─────────────────────────────────────────────────────────────
   AUTH — single gate lives on index.html, we just check here
   ───────────────────────────────────────────────────────────── */
function signOut() {
  sessionStorage.removeItem('norlo_auth');
  window.location.href = 'index.html';
}

function checkAuth() {
  if (sessionStorage.getItem('norlo_auth') === '1') return true;
  // Not logged in — send to index.html login
  window.location.href = 'index.html';
  return false;
}

/* ─────────────────────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────────────────────── */
function initApp() {
  buildDayTabs();
  loadAllDays();
}

function buildDayTabs() {
  const bar = document.getElementById('dayTabBar');
  const today = new Date();
  bar.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const dayName = DAY_SHORT[d.getDay()];
    const month = d.getMonth() + 1;
    const date = d.getDate();
    const label = `${dayName} ${month}/${date}`;

    const btn = document.createElement('button');
    btn.className = 'day-tab' + (i === 0 ? ' active today' : '');
    btn.dataset.day = i;
    btn.textContent = label;
    btn.onclick = () => switchDay(i);
    bar.appendChild(btn);
  }

  // Default to Day0 (today)
  currentDay = 0;
  updateDayLabel(0);
}

function updateDayLabel(dayIndex) {
  const d = new Date();
  d.setDate(d.getDate() + dayIndex);
  const dayName = DAY_NAMES[d.getDay()];
  const month = d.getMonth() + 1;
  const date = d.getDate();
  document.getElementById('dayLabel').textContent = `${dayName} ${month}/${date}`;
}

/* ─────────────────────────────────────────────────────────────
   DATA FETCHING
   ───────────────────────────────────────────────────────────── */
async function loadAllDays() {
  const loading = document.getElementById('loadingOverlay');
  loading.style.display = 'block';
  document.getElementById('gridContainer').innerHTML = '';

  if (!PLANNING_SCRIPT_URL) {
    // No endpoint configured yet — show setup message
    loading.innerHTML = `
      <div style="color:#86efac; font-size:0.9rem; margin-bottom:1rem;">
        ✓ Planning Grid UI is ready
      </div>
      <div style="color:#888; font-size:0.8rem; max-width:400px; margin:0 auto; line-height:1.5;">
        Next step: create the Apps Script endpoint on the
        Planning TMW Data sheet to serve JSON. The fetch architecture
        is wired and waiting — just drop in the URL.
      </div>
    `;
    return;
  }

  try {
    // Fetch all 7 days in one call
    const url = `${PLANNING_SCRIPT_URL}?token=${encodeURIComponent(API_TOKEN)}&action=readAllDays`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    // Parse and cache each day
    for (let d = 0; d < 7; d++) {
      const rows = (data.days && data.days[d]) || [];
      allDaysData[d] = parseDay(rows);
    }

    loading.style.display = 'none';
    renderDay(currentDay);
  } catch (err) {
    loading.innerHTML = `<div style="color:#ef4444;">Error loading data: ${err.message}</div>`;
  }
}

function refreshData() {
  allDaysData = {};
  loadAllDays();
}

/* ─────────────────────────────────────────────────────────────
   PARSE — convert raw row arrays into driver-grouped sections
   ───────────────────────────────────────────────────────────── */
function parseDay(rows) {
  // Map rows to objects
  const records = rows.map(row => {
    const rec = {};
    COLUMNS.forEach((col, i) => rec[col] = row[i] || '');
    return rec;
  });

  // Group by driver — collect all stops per driver
  const driverMap = {};
  records.forEach(rec => {
const id = rec.DriverID;
    if (!id) return;
    if (rec.DriverName && rec.DriverName.includes(',MOCK')) return;
    if (id === 'STIST') return;
    if (!driverMap[id]) {
      driverMap[id] = {
        id: id,
        name: rec.DriverName,
        terminal: rec.TerminalName,
        terminalOrder: parseInt(rec.TerminalOrder) || 999,
        roleBucket: rec.RoleBucket,
        equipClass: rec.EquipClass,
        stops: [],
      };
    }
    driverMap[id].stops.push(rec);
  });

  // Sort stops by StopSeq
  Object.values(driverMap).forEach(d => {
    d.stops.sort((a, b) => (parseInt(a.StopSeq) || 0) - (parseInt(b.StopSeq) || 0));
    // Derive display fields
    d.firstStopCity = '';
    d.firstStopArrival = '';
    d.routeSummary = '';
    d.tripStatus = '';

    // Find first non-BMT stop for city/arrival
    const realStops = d.stops.filter(s => s.EventCode && !s.EventCode.includes('BMT') && !s.EventCode.includes('RTP'));
    if (realStops.length > 0) {
      d.firstStopCity = realStops[0].City + (realStops[0].State ? ', ' + realStops[0].State : '');
      d.firstStopArrival = formatTime(realStops[0].Arrival);
    }

    // Route summary: unique cities in order
    const cities = [];
    d.stops.forEach(s => {
      if (s.City && !cities.includes(s.City)) cities.push(s.City);
    });
    d.routeSummary = cities.join(' → ');

    // Trip status from OrderStatus of first order stop
    const orderStops = d.stops.filter(s => s.OrderNumber && s.OrderNumber !== '0');
    if (orderStops.length > 0) {
      const status = orderStops[0].OrderStatus;
      d.tripStatus = status === 'CMP' ? 'Completed' :
                     status === 'DSP' ? 'Dispatched' :
                     status === 'STD' ? 'Started' :
                     status === 'PLN' ? 'Planned' : status || '';
    }

    // Departed from yard time as "start time"
    d.startTime = formatTime(d.stops[0]?.DepartedFromYard) || '';

    // First stop arrival
    if (!d.firstStopArrival && d.stops.length > 0) {
      d.firstStopArrival = formatTime(d.stops[0]?.Arrival) || '';
    }
  });

  // Group drivers by terminal
  const drivers = Object.values(driverMap);
  const terminalGroups = {};
  drivers.forEach(d => {
    const t = d.terminal || 'UNKNOWN';
    if (!terminalGroups[t]) terminalGroups[t] = { terminal: t, order: d.terminalOrder, drivers: [] };
    terminalGroups[t].drivers.push(d);
  });

  // Sort groups by terminal order, then drivers by name
  const sections = Object.values(terminalGroups)
    .sort((a, b) => a.order - b.order);
  sections.forEach(s => s.drivers.sort((a, b) => a.name.localeCompare(b.name)));

  return { sections, driverCount: drivers.length };
}

function formatTime(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    let h = d.getHours(), m = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  } catch { return ''; }
}

function formatDriverName(raw) {
  // LASTNAME,FIRSTNAME → Lastname, Firstname
  if (!raw) return '';
  const parts = raw.split(',');
  if (parts.length < 2) return raw;
  const last = parts[0].trim(), first = parts[1].trim();
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase();
  return cap(last) + ', ' + cap(first);
}

/* ─────────────────────────────────────────────────────────────
   RENDER
   ───────────────────────────────────────────────────────────── */
function renderDay(dayIndex) {
  const container = document.getElementById('gridContainer');
  const data = allDaysData[dayIndex];

  if (!data || data.sections.length === 0) {
    const d = new Date();
    d.setDate(d.getDate() + dayIndex);
    container.innerHTML = `<div class="empty-day">No dispatched drivers for ${DAY_NAMES[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}</div>`;
    updateDriverCount(0);
    return;
  }

  let html = '';
  let totalDrivers = 0;

  data.sections.forEach((section, si) => {
    const filteredDrivers = searchTerm
      ? section.drivers.filter(d => matchesSearch(d))
      : section.drivers;

    if (filteredDrivers.length === 0) return;
    totalDrivers += filteredDrivers.length;

    html += `
      <div class="section-block">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-title">${section.terminal}</span>
          <span>
            <span class="section-count">${filteredDrivers.length} driver${filteredDrivers.length !== 1 ? 's' : ''}</span>
            <span class="section-chevron">▼</span>
          </span>
        </div>
        <div class="section-body">
          <table class="planning-table">
            <thead>
              <tr>
                <th>Driver</th>
                <th>Start</th>
                <th>Arr. 1st Stop</th>
                <th>City</th>
                <th>Route Summary</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>`;

    filteredDrivers.forEach(d => {
      const statusChip = getStatusChip(d.tripStatus);
      html += `
              <tr>
                <td class="driver-name">${formatDriverName(d.name)}</td>
                <td>${d.startTime}</td>
                <td>${d.firstStopArrival}</td>
                <td>${d.firstStopCity}</td>
                <td class="route-summary" title="${escapeHtml(d.routeSummary)}">${d.routeSummary}</td>
                <td>${statusChip}</td>
              </tr>`;
    });

    html += `
            </tbody>
          </table>
        </div>
      </div>`;
  });

  container.innerHTML = html;
  updateDriverCount(totalDrivers);
  window.scrollTo({ top: 0 });
}

function getStatusChip(status) {
  if (!status) return '<span class="chip chip-pending">—</span>';
  const s = status.toLowerCase();
  if (s === 'dispatched') return '<span class="chip chip-dispatched">Dispatched</span>';
  if (s === 'completed') return '<span class="chip chip-dispatched">Completed</span>';
  if (s === 'started') return '<span class="chip chip-dispatched">Started</span>';
  if (s === 'planned') return '<span class="chip chip-pending">Planned</span>';
  return `<span class="chip chip-pending">${escapeHtml(status)}</span>`;
}

function updateDriverCount(n) {
  document.getElementById('driverCount').textContent = `${n} driver${n !== 1 ? 's' : ''}`;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─────────────────────────────────────────────────────────────
   DAY TABS
   ───────────────────────────────────────────────────────────── */
function switchDay(dayIndex) {
  currentDay = dayIndex;

  // Update tab styling
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.day-tab[data-day="${dayIndex}"]`).classList.add('active');

  // Update day label with actual date
  updateDayLabel(dayIndex);

  // Render cached data instantly (no fetch)
  if (allDaysData[dayIndex]) {
    renderDay(dayIndex);
  } else {
    const d = new Date();
    d.setDate(d.getDate() + dayIndex);
    document.getElementById('gridContainer').innerHTML =
      `<div class="empty-day">No data loaded for ${DAY_NAMES[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}</div>`;
  }
}

/* ─────────────────────────────────────────────────────────────
   COLLAPSE / EXPAND
   ───────────────────────────────────────────────────────────── */
function toggleSection(header) {
  header.classList.toggle('collapsed');
}

function expandAll() {
  document.querySelectorAll('.section-header').forEach(h => h.classList.remove('collapsed'));
}

function collapseAll() {
  document.querySelectorAll('.section-header').forEach(h => h.classList.add('collapsed'));
}

/* ─────────────────────────────────────────────────────────────
   SEARCH
   ───────────────────────────────────────────────────────────── */
function applySearch() {
  searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  renderDay(currentDay);
}

function matchesSearch(driver) {
  if (!searchTerm) return true;
  const searchable = [
    driver.name, driver.terminal, driver.routeSummary,
    driver.firstStopCity, driver.tripStatus
  ].join(' ').toLowerCase();
  return searchable.includes(searchTerm);
}

/* ─────────────────────────────────────────────────────────────
   BACK TO TOP
   ───────────────────────────────────────────────────────────── */
window.addEventListener('scroll', () => {
  const btn = document.getElementById('backToTop');
  if (window.scrollY > 400) btn.classList.add('visible');
  else btn.classList.remove('visible');
}, { passive: true });

/* ─────────────────────────────────────────────────────────────
   BOOT
   ───────────────────────────────────────────────────────────── */
if (checkAuth()) {
  initApp();
}
</script>
</body>
</html>
